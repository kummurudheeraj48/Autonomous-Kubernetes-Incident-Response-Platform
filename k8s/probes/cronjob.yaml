apiVersion: batch/v1
kind: CronJob
metadata:
  name: kubeguardian-network-cron
  namespace: default
spec:
  # Schedule expression: Run automatically every 5 minutes
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: probe
            image: kubeguardian-probe:v1.0.0
            imagePullPolicy: Never
            resources:
              limits:
                memory: "64Mi"
                cpu: "50m"
              requests:
                memory: "32Mi"
                cpu: "25m"
          restartPolicy: OnFailure
